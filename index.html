<!DOCTYPE html>
<html>
<head>
    <title>VidyaGuide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>VidyaGuide</h1>
    <p>Your AI Career Mentor</p>

    <h2>Resume Analyzer</h2>
    <textarea id="resumeText" placeholder="Paste your resume here"></textarea>
    <button onclick="analyzeResume()">Analyze</button>

    <h2>Career Recommendation</h2>
    <input type="text" id="skills" placeholder="Enter your skills">
    <input type="text" id="interest" placeholder="Enter interest">
    <button onclick="getCareerAdvice()">Get Advice</button>

    <div id="output"></div>
</div>

<script src="script.js"></script>
</body>
</html>
