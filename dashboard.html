<!DOCTYPE html>
<html>
<head>
    <title>VidhyaGuide Career Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            text-align: center;
        }

        h1 {
            background: #2c3e50;
            color: white;
            padding: 20px;
            margin: 0;
        }

        .container {
            margin: 30px auto;
            width: 85%;
        }

        textarea {
            width: 90%;
            height: 140px;
            padding: 12px;
            margin: 15px 0;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            background: #3498db;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        #result {
            background: white;
            margin: 30px auto;
            padding: 20px;
            width: 90%;
            border-radius: 10px;
            text-align: left;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            white-space: pre-line;
        }

        .score {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>

<body>

<h1>VidhyaGuide Smart Resume & Career Analyzer</h1>

<div class="container">

    <h2>Paste Your Resume</h2>
    <textarea id="resumeInput" placeholder="Paste your full resume here..."></textarea>
    <br>
    <button onclick="analyzeResume()">Analyze Resume</button>

    <h2>Enter Your Skills & Interests</h2>
    <textarea id="skillsInput" placeholder="Example: python, data analysis, leadership"></textarea>
    <br>
    <button onclick="generateCareer()">Get Career Plan</button>

    <div id="result"></div>

</div>

<script>

// -------------------- RESUME ANALYZER --------------------

function analyzeResume() {

    const text = document.getElementById("resumeInput").value.toLowerCase();
    const resultBox = document.getElementById("result");

    if (!text.trim()) {
        resultBox.innerText = "Please paste your resume first.";
        return;
    }

    let score = 50;
    let weaknesses = [];
    let improvements = [];
    let wording = [];

    if (text.includes("project")) score += 10;
    else weaknesses.push("No projects mentioned.");

    if (text.includes("intern")) score += 10;
    else weaknesses.push("No internship experience found.");

    if (text.includes("skill")) score += 10;
    else weaknesses.push("Skills section missing.");

    if (text.includes("achievement")) score += 10;
    else weaknesses.push("No achievements highlighted.");

    if (text.length > 400) score += 10;
    else weaknesses.push("Resume content too short.");

    if (score > 100) score = 100;

    improvements.push("Add measurable achievements (e.g., Increased sales by 20%).");
    improvements.push("Include more technical skills.");
    improvements.push("Add strong action verbs.");
    improvements.push("Mention certifications if available.");

    wording.push("Replace 'worked on' with 'developed and implemented'.");
    wording.push("Replace 'responsible for' with 'led and managed'.");
    wording.push("Use numbers to show impact.");

    let result = `
RESUME SCORE: ${score}/100

Weak Areas:
- ${weaknesses.join("\n- ")}

Suggested Improvements:
- ${improvements.join("\n- ")}

Better Wording Suggestions:
- ${wording.join("\n- ")}
`;

    resultBox.innerText = result;
}

// -------------------- CAREER ANALYZER --------------------

function generateCareer() {

    const input = document.getElementById("skillsInput").value.toLowerCase();
    const resultBox = document.getElementById("result");

    if (!input.trim()) {
        resultBox.innerText = "Please enter your skills first.";
        return;
    }

    let result = "";

    if (input.includes("python") || input.includes("java") || input.includes("coding")) {

        result = `
Career Path: Software Developer

Why this fits you:
Strong technical thinking and coding interest.

Roadmap:
1. Master one programming language
2. Learn Data Structures
3. Build real-world projects
4. Apply for internships

Salary Range: 4–15 LPA
        `;

    }
    else if (input.includes("data") || input.includes("sql") || input.includes("analysis")) {

        result = `
Career Path: Data Analyst

Why this fits you:
Strong analytical and logical skills.

Roadmap:
1. Learn SQL & Excel
2. Python for Data
3. Power BI / Tableau
4. Build portfolio dashboards

Salary Range: 5–18 LPA
        `;

    }
    else if (input.includes("design") || input.includes("ui") || input.includes("ux")) {

        result = `
Career Path: UI/UX Designer

Why this fits you:
Creative and visual thinking ability.

Roadmap:
1. Learn Figma
2. Study UX principles
3. Build portfolio
4. Freelance projects

Salary Range: 4–12 LPA
        `;

    }
    else {

        result = `
Career Path: General Career Exploration

We recommend exploring internships,
improving communication skills,
and building technical foundations.
        `;
    }

    resultBox.innerText = result;
}

</script>

</body>
</html>
