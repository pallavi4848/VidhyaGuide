<!DOCTYPE html>
<html>
<head>
    <title>VidhyaGuide Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            margin: 0;
        }

        .container {
            margin-top: 30px;
        }

        textarea {
            width: 80%;
            height: 120px;
            padding: 10px;
            margin: 15px 0;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        #result {
            width: 80%;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            text-align: left;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            white-space: pre-line;
        }
    </style>
</head>

<body>

<h1>VidhyaGuide Career Analyzer</h1>

<div class="container">

    <h2>Enter Your Skills & Interests</h2>
    <textarea id="skillsInput" placeholder="Example: python, data analysis, leadership"></textarea>
    <br>
    <button onclick="generateCareer()">Get Career Plan</button>

    <div id="result"></div>

</div>

<script>

function generateCareer() {

    const input = document.getElementById("skillsInput").value.toLowerCase();
    const resultBox = document.getElementById("result");

    if (!input.trim()) {
        resultBox.innerText = "Please enter your skills first.";
        return;
    }

    let score = {
        developer: 0,
        data: 0,
        design: 0,
        marketing: 0,
        management: 0
    };

    // Developer keywords
    if (input.includes("python")) score.developer += 2;
    if (input.includes("java")) score.developer += 2;
    if (input.includes("javascript")) score.developer += 2;
    if (input.includes("html")) score.developer += 1;
    if (input.includes("css")) score.developer += 1;
    if (input.includes("coding")) score.developer += 1;

    // Data keywords
    if (input.includes("data")) score.data += 2;
    if (input.includes("analysis")) score.data += 2;
    if (input.includes("excel")) score.data += 1;
    if (input.includes("sql")) score.data += 2;

    // Design keywords
    if (input.includes("design")) score.design += 2;
    if (input.includes("ui")) score.design += 2;
    if (input.includes("ux")) score.design += 2;
    if (input.includes("figma")) score.design += 2;

    // Marketing keywords
    if (input.includes("marketing")) score.marketing += 2;
    if (input.includes("seo")) score.marketing += 2;
    if (input.includes("social media")) score.marketing += 2;

    // Management keywords
    if (input.includes("leadership")) score.management += 2;
    if (input.includes("management")) score.management += 2;
    if (input.includes("communication")) score.management += 1;

    const bestCareer = Object.keys(score).reduce((a, b) =>
        score[a] > score[b] ? a : b
    );

    let result = "";

    if (bestCareer === "developer") {
        result = `
Career Path: Software Developer

Why this fits you:
Strong technical and logical thinking.

Roadmap:
1. Master one programming language
2. Learn Data Structures
3. Build real projects
4. Apply for internships

Salary Range: 4–15 LPA
        `;
    }
    else if (bestCareer === "data") {
        result = `
Career Path: Data Analyst

Why this fits you:
You have analytical mindset.

Roadmap:
1. Learn SQL & Excel
2. Python for Data
3. Power BI / Tableau
4. Create portfolio dashboards

Salary Range: 5–18 LPA
        `;
    }
    else if (bestCareer === "design") {
        result = `
Career Path: UI/UX Designer

Why this fits you:
You are creative and visual.

Roadmap:
1. Learn Figma
2. Study UX principles
3. Build portfolio
4. Freelance projects

Salary Range: 4–12 LPA
        `;
    }
    else if (bestCareer === "marketing") {
        result = `
Career Path: Digital Marketer

Why this fits you:
Interest in branding and growth.

Roadmap:
1. Learn SEO
2. Run ad campaigns
3. Social media strategy
4. Analyze results

Salary Range: 3–10 LPA
        `;
    }
    else if (bestCareer === "management") {
        result = `
Career Path: Business / Management

Why this fits you:
Strong communication and leadership.

Roadmap:
1. Improve leadership skills
2. Learn project management tools
3. Internship in operations
4. MBA (optional)

Salary Range: 5–20 LPA
        `;
    }
    else {
        result = `
Career Path: Career Exploration

Explore internships and develop foundational
technical and communication skills.
        `;
    }

    resultBox.innerText = result;
}

</script>

</body>
</html>
