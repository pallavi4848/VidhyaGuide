<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vidya Guide</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🎓 Vidya Guide</h1>
  <p>Your Smart Career Assistant</p>
</header>

<section class="upload">
  <h2>Upload Resume</h2>
  <input type="file" id="resumeInput" accept=".txt,.pdf,.doc,.docx">
  <textarea id="skillsInput" placeholder="Enter your skills (comma separated)"></textarea>
  <button onclick="analyzeResume()">Analyze Resume</button>
</section>

<section id="matchedCompanies"></section>

<section id="companyChoice" style="display:none;">
  <h2>Select Companies You Want</h2>
  <div id="companyCheckboxes"></div>
  <button onclick="analyzeSelected()">Analyze Selected Companies</button>
</section>

<section id="results"></section>

<script src="companies.js"></script>
<script src="script.js"></script>

</body>
</html>
